<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍎 Admin Login Test - FreshFruits</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-md mx-auto bg-white rounded-lg shadow p-6">
    <h1 class="text-2xl font-bold text-center mb-6">🍎 Admin Login Test</h1>
    
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Email:</label>
      <input type="email" id="email" value="admin@freshfruits.com" class="w-full p-2 border rounded">
    </div>
    
    <div class="mb-4">
      <label class="block text-sm font-medium mb-2">Password:</label>
      <input type="password" id="password" value="admin123" class="w-full p-2 border rounded">
    </div>
    
    <button onclick="testLogin()" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
      Test Login
    </button>
    
    <div id="result" class="mt-4 p-3 rounded hidden"></div>
  </div>

  <script>
    async function testLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const result = document.getElementById('result');
      
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (res.ok) {
          result.className = 'mt-4 p-3 rounded bg-green-100 text-green-800';
          result.innerHTML = '✅ Login successful! Token: ' + data.token.substring(0, 20) + '...';
        } else {
          result.className = 'mt-4 p-3 rounded bg-red-100 text-red-800';
          result.innerHTML = '❌ Login failed: ' + data.message;
        }
        result.classList.remove('hidden');
      } catch (err) {
        result.className = 'mt-4 p-3 rounded bg-red-100 text-red-800';
        result.innerHTML = '❌ Error: ' + err.message;
        result.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
