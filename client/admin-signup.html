<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍎 Admin Sign Up - FreshFruits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-btn {
      background: linear-gradient(90deg, #f43f5e 0%, #8b5cf6 100%);
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center">
  <div class="flex flex-col items-center justify-center min-h-screen w-full">
    <div class="mb-8 flex flex-col items-center">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style="background: linear-gradient(135deg, #f43f5e 0%, #8b5cf6 100%);">
        <i class="fas fa-user-shield text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">Admin Sign Up</h1>
      <p class="text-gray-600 text-center">Create your administrator account</p>
    </div>
    
    <form id="adminSignupForm" class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md space-y-6">
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-gray-700 font-medium mb-1" for="firstName"><i class="fas fa-user mr-2"></i>First Name</label>
          <input type="text" id="firstName" name="firstName" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
        </div>
        <div>
          <label class="block text-gray-700 font-medium mb-1" for="lastName"><i class="fas fa-user mr-2"></i>Last Name</label>
          <input type="text" id="lastName" name="lastName" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
        </div>
      </div>
      
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="email"><i class="fas fa-envelope mr-2"></i>Email Address</label>
        <input type="email" id="email" name="email" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
      </div>
      
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="mobile"><i class="fas fa-phone mr-2"></i>Mobile Number</label>
        <input type="tel" id="mobile" name="mobile" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
      </div>
      
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="address"><i class="fas fa-map-marker-alt mr-2"></i>Address</label>
        <input type="text" id="address" name="address" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
      </div>
      
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="password"><i class="fas fa-lock mr-2"></i>Password</label>
        <input type="password" id="password" name="password" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
      </div>
      
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="confirmPassword"><i class="fas fa-lock mr-2"></i>Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
      </div>
      
      <button type="submit" class="w-full gradient-btn text-white font-semibold py-3 rounded-lg shadow-md hover:opacity-90 transition flex items-center justify-center text-lg">
        <i class="fas fa-user-plus mr-2"></i> Create Admin Account
      </button>
    </form>
    
    <div class="flex flex-col items-center mt-8">
      <div class="flex items-center text-gray-500 text-sm mb-2">
        <i class="fas fa-shield-alt mr-2"></i> Already have an account?
      </div>
      <a href="admin-login.html" class="text-blue-600 hover:underline text-sm flex items-center"><i class="fas fa-sign-in-alt mr-1"></i> Login to Admin Panel</a>
    </div>
  </div>

  <script>
    document.getElementById('adminSignupForm').onsubmit = async function(e) {
      e.preventDefault();
      
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }
      
      const formData = {
        firstName: document.getElementById('firstName').value,
        lastName: document.getElementById('lastName').value,
        email: document.getElementById('email').value,
        mobile: document.getElementById('mobile').value,
        address: document.getElementById('address').value,
        password: password,
        role: 'admin'
      };
      
      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        
        const data = await res.json();
        
        console.log('Response from server:', data); // Debugging log
        if (res.ok) {
          alert('Admin account created successfully! You can now login.');
          window.location.href = 'admin-login.html';
        } else {
          alert(data.message || 'Registration failed');
        }
      } catch (err) {
        alert('Error creating account');
      }
    };
  </script>
</body>
</html>
