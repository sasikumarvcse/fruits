<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History - GrowwPark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .order-card {
            transition: all 0.3s ease;
        }
        .order-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-placed { background-color: #fef3c7; color: #92400e; }
        .status-confirmed { background-color: #dbeafe; color: #1e40af; }
        .status-shipped { background-color: #fef3c7; color: #92400e; }
        .status-delivered { background-color: #d1fae5; color: #065f46; }
        .status-cancelled { background-color: #fee2e2; color: #991b1b; }
        .timeline-item {
            position: relative;
            padding-left: 2rem;
        }
        .timeline-item::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0.5rem;
            width: 0.75rem;
            height: 0.75rem;
            border-radius: 50%;
            background-color: #3b82f6;
        }
        .timeline-item::after {
            content: '';
            position: absolute;
            left: 0.875rem;
            top: 1.25rem;
            width: 2px;
            height: calc(100% - 0.75rem);
            background-color: #e5e7eb;
        }
        .timeline-item:last-child::after {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-blue-600">GrowwPark</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/user-dashboard.html" class="text-gray-600 hover:text-blue-600">Dashboard</a>
                    <a href="/products.html" class="text-gray-600 hover:text-blue-600">Products</a>
                    <button onclick="logout()" class="text-gray-600 hover:text-red-600">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Order History</h1>
            <p class="text-gray-600 mt-2">Track your orders and view their current status</p>
        </div>

        <!-- Order Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-2 bg-blue-100 rounded-lg">
                        <i class="fas fa-shopping-bag text-blue-600"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Total Orders</p>
                        <p class="text-2xl font-bold text-gray-900" id="totalOrders">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-2 bg-yellow-100 rounded-lg">
                        <i class="fas fa-clock text-yellow-600"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Pending</p>
                        <p class="text-2xl font-bold text-gray-900" id="pendingOrders">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-2 bg-green-100 rounded-lg">
                        <i class="fas fa-truck text-green-600"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Delivered</p>
                        <p class="text-2xl font-bold text-gray-900" id="deliveredOrders">0</p>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-2 bg-red-100 rounded-lg">
                        <i class="fas fa-times text-red-600"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-sm font-medium text-gray-600">Cancelled</p>
                        <p class="text-2xl font-bold text-gray-900" id="cancelledOrders">0</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <div class="flex flex-wrap items-center gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Status Filter</label>
                    <select id="statusFilter" class="border border-gray-300 rounded-md px-3 py-2">
                        <option value="">All Orders</option>
                        <option value="placed">Placed</option>
                        <option value="confirmed">Confirmed</option>
                        <option value="shipped">Shipped</option>
                        <option value="delivered">Delivered</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Date Range</label>
                    <select id="dateFilter" class="border border-gray-300 rounded-md px-3 py-2">
                        <option value="">All Time</option>
                        <option value="7">Last 7 Days</option>
                        <option value="30">Last 30 Days</option>
                        <option value="90">Last 3 Months</option>
                    </select>
                </div>
                <div class="ml-auto">
                    <button onclick="refreshOrders()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                        <i class="fas fa-sync-alt mr-2"></i>Refresh
                    </button>
                </div>
            </div>
        </div>

        <!-- Orders List -->
        <div id="ordersContainer" class="space-y-6">
            <!-- Orders will be loaded here -->
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            <p class="text-gray-600 mt-4">Loading orders...</p>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12 hidden">
            <i class="fas fa-shopping-bag text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-lg font-medium text-gray-900 mb-2">No orders found</h3>
            <p class="text-gray-600 mb-6">You haven't placed any orders yet.</p>
            <a href="/products.html" class="bg-blue-600 text-white px-6 py-3 rounded-md hover:bg-blue-700">
                Start Shopping
            </a>
        </div>
    </div>

    <!-- Order Details Modal -->
    <div id="orderModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden z-50">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-white rounded-lg max-w-4xl w-full max-h-screen overflow-y-auto">
                <div class="p-6 border-b">
                    <div class="flex justify-between items-center">
                        <h3 class="text-lg font-medium text-gray-900">Order Details</h3>
                        <button onclick="closeOrderModal()" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <div id="orderModalContent" class="p-6">
                    <!-- Order details will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let orders = [];
        let filteredOrders = [];

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/orders/user', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    orders = data.orders || [];
                    filteredOrders = [...orders];
                    updateOrderStats();
                    renderOrders();
                } else {
                    console.error('Failed to load orders:', response.status);
                    showNotification('Failed to load orders', 'error');
                }
            } catch (error) {
                console.error('Error loading orders:', error);
                showNotification('Error loading orders', 'error');
            } finally {
                document.getElementById('loadingState').classList.add('hidden');
            }
        }

        // Update order statistics
        function updateOrderStats() {
            const stats = {
                total: orders.length,
                pending: orders.filter(o => ['placed', 'pending', 'confirmed'].includes(o.status)).length,
                delivered: orders.filter(o => o.status === 'delivered').length,
                cancelled: orders.filter(o => o.status === 'cancelled').length
            };

            document.getElementById('totalOrders').textContent = stats.total;
            document.getElementById('pendingOrders').textContent = stats.pending;
            document.getElementById('deliveredOrders').textContent = stats.delivered;
            document.getElementById('cancelledOrders').textContent = stats.cancelled;
        }

        // Render orders
        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            
            if (filteredOrders.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                container.innerHTML = '';
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            
            container.innerHTML = filteredOrders.map(order => `
                <div class="bg-white rounded-lg shadow order-card">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="text-lg font-medium text-gray-900">Order #${order._id.slice(-6)}</h3>
                                <p class="text-sm text-gray-600">Placed on ${new Date(order.createdAt).toLocaleDateString()}</p>
                            </div>
                            <span class="status-badge status-${order.status}">${order.status}</span>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div>
                                <p class="text-sm font-medium text-gray-700">Total Amount</p>
                                <p class="text-lg font-bold text-gray-900">₹${order.total.toFixed(2)}</p>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-700">Payment Status</p>
                                <p class="text-sm text-gray-900">${order.paymentStatus}</p>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-700">Items</p>
                                <p class="text-sm text-gray-900">${order.items.length} item(s)</p>
                            </div>
                        </div>

                        <div class="flex justify-between items-center">
                            <button onclick="viewOrderDetails('${order._id}')" class="text-blue-600 hover:text-blue-800 font-medium">
                                View Details
                            </button>
                            ${order.status === 'delivered' ? `
                                <button onclick="requestReturn('${order._id}')" class="text-red-600 hover:text-red-800 font-medium">
                                    Request Return
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // View order details
        async function viewOrderDetails(orderId) {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/orders/${orderId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const order = data.order;
                    
                    document.getElementById('orderModalContent').innerHTML = `
                        <div class="space-y-6">
                            <!-- Order Header -->
                            <div class="border-b pb-4">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h4 class="text-xl font-bold text-gray-900">Order #${order._id.slice(-6)}</h4>
                                        <p class="text-gray-600">Placed on ${new Date(order.createdAt).toLocaleString()}</p>
                                    </div>
                                    <span class="status-badge status-${order.status}">${order.status}</span>
                                </div>
                            </div>

                            <!-- Order Items -->
                            <div>
                                <h5 class="text-lg font-medium text-gray-900 mb-4">Order Items</h5>
                                <div class="space-y-4">
                                    ${order.items.map(item => `
                                        <div class="flex items-center space-x-4 p-4 bg-gray-50 rounded-lg">
                                            <img src="${item.item.image || '/client/uploads/default-product.jpg'}" 
                                                 alt="${item.item.name}" 
                                                 class="w-16 h-16 object-cover rounded">
                                            <div class="flex-1">
                                                <h6 class="font-medium text-gray-900">${item.item.name}</h6>
                                                <p class="text-sm text-gray-600">Quantity: ${item.quantity}</p>
                                                <p class="text-sm text-gray-600">Price: ₹${item.item.price}</p>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- Shipping Details -->
                            <div>
                                <h5 class="text-lg font-medium text-gray-900 mb-4">Shipping Details</h5>
                                <div class="bg-gray-50 p-4 rounded-lg">
                                    <p class="font-medium">${order.recipientName}</p>
                                    <p class="text-gray-600">${order.address}</p>
                                    <p class="text-gray-600">Mobile: ${order.mobile}</p>
                                    <p class="text-gray-600">Pincode: ${order.pincode}</p>
                                </div>
                            </div>

                            <!-- Order Timeline -->
                            <div>
                                <h5 class="text-lg font-medium text-gray-900 mb-4">Order Timeline</h5>
                                <div class="space-y-4">
                                    ${order.orderTimeline.map(timeline => `
                                        <div class="timeline-item">
                                            <div class="bg-white p-4 rounded-lg border">
                                                <div class="flex justify-between items-start">
                                                    <div>
                                                        <p class="font-medium text-gray-900">${timeline.description}</p>
                                                        <p class="text-sm text-gray-600">${new Date(timeline.timestamp).toLocaleString()}</p>
                                                    </div>
                                                    <span class="status-badge status-${timeline.status}">${timeline.status}</span>
                                                </div>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>

                            <!-- Payment Details -->
                            <div>
                                <h5 class="text-lg font-medium text-gray-900 mb-4">Payment Details</h5>
                                <div class="bg-gray-50 p-4 rounded-lg">
                                    <div class="grid grid-cols-2 gap-4">
                                        <div>
                                            <p class="text-sm text-gray-600">Payment Method</p>
                                            <p class="font-medium">${order.paymentMethod}</p>
                                        </div>
                                        <div>
                                            <p class="text-sm text-gray-600">Payment Status</p>
                                            <p class="font-medium">${order.paymentStatus}</p>
                                        </div>
                                        <div>
                                            <p class="text-sm text-gray-600">Total Amount</p>
                                            <p class="font-medium">₹${order.total.toFixed(2)}</p>
                                        </div>
                                        ${order.paymentId ? `
                                            <div>
                                                <p class="text-sm text-gray-600">Payment ID</p>
                                                <p class="font-medium text-sm">${order.paymentId}</p>
                                            </div>
                                        ` : ''}
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    
                    document.getElementById('orderModal').classList.remove('hidden');
                } else {
                    showNotification('Failed to load order details', 'error');
                }
            } catch (error) {
                console.error('Error loading order details:', error);
                showNotification('Error loading order details', 'error');
            }
        }

        // Close order modal
        function closeOrderModal() {
            document.getElementById('orderModal').classList.add('hidden');
        }

        // Request return
        function requestReturn(orderId) {
            if (confirm('Are you sure you want to request a return for this order?')) {
                // Implement return request logic
                showNotification('Return request submitted', 'success');
            }
        }

        // Filter orders
        function filterOrders() {
            const statusFilter = document.getElementById('statusFilter').value;
            const dateFilter = document.getElementById('dateFilter').value;

            filteredOrders = orders.filter(order => {
                let statusMatch = true;
                let dateMatch = true;

                if (statusFilter) {
                    statusMatch = order.status === statusFilter;
                }

                if (dateFilter) {
                    const orderDate = new Date(order.createdAt);
                    const cutoffDate = new Date();
                    cutoffDate.setDate(cutoffDate.getDate() - parseInt(dateFilter));
                    dateMatch = orderDate >= cutoffDate;
                }

                return statusMatch && dateMatch;
            });

            renderOrders();
        }

        // Refresh orders
        function refreshOrders() {
            document.getElementById('loadingState').classList.remove('hidden');
            loadOrders();
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 p-4 rounded-lg shadow-lg z-50 ${
                type === 'success' ? 'bg-green-500 text-white' :
                type === 'error' ? 'bg-red-500 text-white' :
                'bg-blue-500 text-white'
            }`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        // Event listeners
        document.getElementById('statusFilter').addEventListener('change', filterOrders);
        document.getElementById('dateFilter').addEventListener('change', filterOrders);

        // Initialize
        checkAuth();
        loadOrders();
    </script>
</body>
</html>
