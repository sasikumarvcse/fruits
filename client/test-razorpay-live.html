<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Razorpay Test</title>
  <link href="https://cdn.tailwindcss.com" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-gray-50 p-8">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 text-center">🔧 Live Razorpay Test</h1>
    
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-xl font-semibold mb-4">Server Status</h2>
      <div id="serverStatus" class="text-sm mb-4">Checking server status...</div>
      <button onclick="checkServerStatus()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Check Server Status
      </button>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-xl font-semibold mb-4">Razorpay Configuration</h2>
      <div id="razorpayConfig" class="text-sm mb-4">Loading configuration...</div>
      <button onclick="loadRazorpayConfig()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
        Load Razorpay Config
      </button>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow mb-6">
      <h2 class="text-xl font-semibold mb-4">Test Payment</h2>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-2">Amount (₹)</label>
        <input type="number" id="amount" value="100" min="1" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <button onclick="testPayment()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
        <i class="fas fa-credit-card mr-2"></i>Test Payment
      </button>
      <div id="paymentResult" class="mt-4 text-sm"></div>
    </div>
    
    <div class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-xl font-semibold mb-4">Test Results</h2>
      <div id="testResults" class="space-y-2 text-sm">
        <div>✅ Server: <span id="serverResult">Checking...</span></div>
        <div>✅ Razorpay Config: <span id="configResult">Checking...</span></div>
        <div>✅ Payment API: <span id="paymentResult">Checking...</span></div>
      </div>
    </div>
  </div>

  <script>
    // Check server status
    async function checkServerStatus() {
      const statusDiv = document.getElementById('serverStatus');
      const resultSpan = document.getElementById('serverResult');
      
      try {
        const response = await fetch('/api/config/razorpay');
        if (response.ok) {
          statusDiv.innerHTML = '<div class="text-green-600">✅ Server is running and responding</div>';
          resultSpan.textContent = 'Working';
          resultSpan.className = 'text-green-600';
        } else {
          statusDiv.innerHTML = '<div class="text-red-600">❌ Server responded with error: ' + response.status + '</div>';
          resultSpan.textContent = 'Error';
          resultSpan.className = 'text-red-600';
        }
      } catch (error) {
        statusDiv.innerHTML = '<div class="text-red-600">❌ Server connection failed: ' + error.message + '</div>';
        resultSpan.textContent = 'Failed';
        resultSpan.className = 'text-red-600';
      }
    }
    
    // Load Razorpay configuration
    async function loadRazorpayConfig() {
      const configDiv = document.getElementById('razorpayConfig');
      const resultSpan = document.getElementById('configResult');
      
      try {
        const response = await fetch('/api/config/razorpay');
        if (response.ok) {
          const config = await response.json();
          if (config.key && config.key.startsWith('rzp_live_')) {
            configDiv.innerHTML = `
              <div class="text-green-600">✅ Live Razorpay key loaded</div>
              <div class="text-xs text-gray-600 mt-1">Key: ${config.key.substring(0, 20)}...</div>
            `;
            resultSpan.textContent = 'Live Key Loaded';
            resultSpan.className = 'text-green-600';
            window.RAZORPAY_KEY_ID = config.key;
          } else {
            configDiv.innerHTML = '<div class="text-red-600">❌ Invalid or missing Razorpay key</div>';
            resultSpan.textContent = 'Invalid Key';
            resultSpan.className = 'text-red-600';
          }
        } else {
          configDiv.innerHTML = '<div class="text-red-600">❌ Failed to load configuration</div>';
          resultSpan.textContent = 'Failed';
          resultSpan.className = 'text-red-600';
        }
      } catch (error) {
        configDiv.innerHTML = '<div class="text-red-600">❌ Configuration error: ' + error.message + '</div>';
        resultSpan.textContent = 'Error';
        resultSpan.className = 'text-red-600';
      }
    }
    
    // Test payment
    async function testPayment() {
      const amount = document.getElementById('amount').value;
      const resultDiv = document.getElementById('paymentResult');
      const resultSpan = document.getElementById('paymentResult');
      
      if (!amount || amount < 1) {
        resultDiv.innerHTML = '<div class="text-red-600">❌ Please enter a valid amount</div>';
        return;
      }
      
      resultDiv.innerHTML = '<div class="text-blue-600">Creating payment order...</div>';
      
      try {
        // Create order
        const orderResponse = await fetch('/api/payment/create-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: parseInt(amount) })
        });
        
        if (!orderResponse.ok) {
          throw new Error('Failed to create order: ' + orderResponse.status);
        }
        
        const order = await orderResponse.json();
        resultDiv.innerHTML = '<div class="text-green-600">✅ Order created successfully!</div>';
        resultSpan.textContent = 'Working';
        resultSpan.className = 'text-green-600';
        
        // Initialize Razorpay
        const options = {
          key: window.RAZORPAY_KEY_ID || 'rzp_live_gBP9geXusrKWUg',
          amount: order.amount,
          currency: order.currency,
          name: 'Test Store',
          description: 'Test Payment',
          order_id: order.id,
          handler: function (response) {
            resultDiv.innerHTML = `
              <div class="text-green-600">✅ Payment successful!</div>
              <div class="text-xs text-gray-600 mt-1">Payment ID: ${response.razorpay_payment_id}</div>
            `;
          },
          prefill: {
            name: 'Test User',
            email: 'test@example.com',
            contact: '9999999999'
          },
          theme: { color: '#3399cc' }
        };
        
        const rzp = new Razorpay(options);
        rzp.open();
        
      } catch (error) {
        resultDiv.innerHTML = '<div class="text-red-600">❌ Payment failed: ' + error.message + '</div>';
        resultSpan.textContent = 'Failed';
        resultSpan.className = 'text-red-600';
      }
    }
    
    // Auto-run tests on page load
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(() => {
        checkServerStatus();
        loadRazorpayConfig();
      }, 1000);
    });
  </script>
</body>
</html>
