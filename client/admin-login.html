<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍎 Admin Login - FreshFruits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-btn {
      background: linear-gradient(90deg, #16a34a 0%, #22c55e 100%);
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center">
  <div class="flex flex-col items-center justify-center min-h-screen w-full">
    <div class="mb-8 flex flex-col items-center">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style="background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);">
        <i class="fas fa-apple-alt text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">🍎 FreshFruits Admin</h1>
      <p class="text-gray-600 text-center">Enter your administrator credentials</p>
    </div>
    <form id="adminLoginForm" class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md space-y-6">
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="adminEmail"><i class="fas fa-envelope mr-2"></i>Email Address</label>
        <input type="email" id="adminEmail" name="email" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required value="admin@freshfruits.com">
      </div>
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="adminPassword"><i class="fas fa-lock mr-2"></i>Password</label>
        <input type="password" id="adminPassword" name="password" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50" required>
      </div>
      <div class="flex items-center">
        <input id="rememberMe" type="checkbox" class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
        <label for="rememberMe" class="ml-2 block text-gray-600 text-sm">Remember me</label>
      </div>
              <button type="submit" class="w-full gradient-btn text-white font-semibold py-3 rounded-lg shadow-md hover:opacity-90 transition flex items-center justify-center text-lg">
          <i class="fas fa-sign-in-alt mr-2"></i> 🍎 Access FreshFruits Admin
        </button>
    </form>
    <div class="flex flex-col items-center mt-8">
      <div class="flex items-center text-gray-500 text-sm mb-2">
        <i class="fas fa-shield-alt mr-2"></i> Don't have an admin account?
      </div>
      <a href="admin-signup.html" class="text-blue-600 hover:underline text-sm flex items-center mb-2"><i class="fas fa-user-plus mr-1"></i> Create Admin Account</a>
      <a href="index.html" class="text-blue-600 hover:underline text-sm flex items-center"><i class="fas fa-arrow-left mr-1"></i> Back to Home</a>
    </div>
  </div>
  <script>
    document.getElementById('adminLoginForm').onsubmit = async function(e) {
      e.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = 'admin-dashboard.html';
        } else {
          alert(data.message || 'Login failed');
        }
      } catch (err) {
        alert('Error logging in');
      }
    };
  </script>
</body>
</html>
