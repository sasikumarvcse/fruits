<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍎 Admin Login - FreshFruits</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-btn {
      background: linear-gradient(90deg, #16a34a 0%, #22c55e 100%);
    }
    .loading {
      display: none;
    }
    .loading.show {
      display: inline-flex;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center">
  <div class="flex flex-col items-center justify-center min-h-screen w-full">
    <div class="mb-8 flex flex-col items-center">
      <div class="w-16 h-16 rounded-2xl flex items-center justify-center mb-4" style="background: linear-gradient(135deg, #16a34a 0%, #22c55e 100%);">
        <i class="fas fa-apple-alt text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2 text-center">🍎 FreshFruits Admin</h1>
      <p class="text-gray-600 text-center">Enter your administrator credentials</p>
    </div>

    <!-- Error Message Display -->
    <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 w-full max-w-md">
      <span class="block sm:inline" id="errorText"></span>
    </div>

    <!-- Success Message Display -->
    <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4 w-full max-w-md">
      <span class="block sm:inline" id="successText"></span>
    </div>

    <form id="adminLoginForm" class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md space-y-6">
      <div>
        <label class="block text-gray-700 font-medium mb-1" for="adminEmail">
          <i class="fas fa-envelope mr-2"></i>Email Address
        </label>
        <input 
          type="email" 
          id="adminEmail" 
          name="email" 
          class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50" 
          required 
          value="admin@freshfruits.com"
          placeholder="Enter your admin email">
      </div>

      <div>
        <label class="block text-gray-700 font-medium mb-1" for="adminPassword">
          <i class="fas fa-lock mr-2"></i>Password
        </label>
        <div class="relative">
          <input 
            type="password" 
            id="adminPassword" 
            name="password" 
            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-green-500 bg-gray-50" 
            required
            placeholder="Enter your password">
          <button 
            type="button" 
            id="togglePassword" 
            class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center">
        <input 
          id="rememberMe" 
          type="checkbox" 
          class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
        <label for="rememberMe" class="ml-2 block text-gray-600 text-sm">Remember me</label>
      </div>

      <button 
        type="submit" 
        id="loginButton"
        class="w-full gradient-btn text-white font-semibold py-3 rounded-lg shadow-md hover:opacity-90 transition flex items-center justify-center text-lg disabled:opacity-50">
        <span id="buttonText">
          <i class="fas fa-sign-in-alt mr-2"></i> 🍎 Access FreshFruits Admin
        </span>
        <span id="buttonLoading" class="loading">
          <i class="fas fa-spinner fa-spin mr-2"></i> Logging in...
        </span>
      </button>
    </form>

    <div class="flex flex-col items-center mt-8">
      <div class="flex items-center text-gray-500 text-sm mb-2">
        <i class="fas fa-shield-alt mr-2"></i> Don't have an admin account?
      </div>
      <a href="admin-signup.html" class="text-blue-600 hover:underline text-sm flex items-center mb-2">
        <i class="fas fa-user-plus mr-1"></i> Create Admin Account
      </a>
      <a href="index.html" class="text-blue-600 hover:underline text-sm flex items-center">
        <i class="fas fa-arrow-left mr-1"></i> Back to Home
      </a>
    </div>
  </div>

  <script>
    // DOM Elements
    const loginForm = document.getElementById('adminLoginForm');
    const emailInput = document.getElementById('adminEmail');
    const passwordInput = document.getElementById('adminPassword');
    const loginButton = document.getElementById('loginButton');
    const buttonText = document.getElementById('buttonText');
    const buttonLoading = document.getElementById('buttonLoading');
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const errorText = document.getElementById('errorText');
    const successText = document.getElementById('successText');
    const togglePassword = document.getElementById('togglePassword');
    const toggleIcon = document.getElementById('toggleIcon');

    // Password visibility toggle
    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      toggleIcon.classList.toggle('fa-eye');
      toggleIcon.classList.toggle('fa-eye-slash');
    });

    // Hide messages function
    function hideMessages() {
      errorMessage.classList.add('hidden');
      successMessage.classList.add('hidden');
    }

    // Show error message
    function showError(message) {
      hideMessages();
      errorText.textContent = message;
      errorMessage.classList.remove('hidden');
    }

    // Show success message
    function showSuccess(message) {
      hideMessages();
      successText.textContent = message;
      successMessage.classList.remove('hidden');
    }

    // Set loading state
    function setLoading(loading) {
      if (loading) {
        loginButton.disabled = true;
        buttonText.style.display = 'none';
        buttonLoading.classList.add('show');
      } else {
        loginButton.disabled = false;
        buttonText.style.display = 'inline-flex';
        buttonLoading.classList.remove('show');
      }
    }

    // Admin Login Form Submission
    loginForm.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();
      
      // Basic validation
      if (!email || !password) {
        showError('Please fill in all fields');
        return;
      }

      if (!email.includes('@')) {
        showError('Please enter a valid email address');
        return;
      }

      // Set loading state
      setLoading(true);
      hideMessages();

      try {
        console.log('🔄 Attempting admin login for:', email);
        
        // ✅ FIXED: Correct API endpoint
        const response = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify({ 
            email: email,
            password: password 
          })
        });
        
        console.log('📊 Response status:', response.status);
        
        const data = await response.json();
        console.log('📋 Response data:', data);
        
        if (response.ok && data.success && data.token) {
          // Login successful
          console.log('✅ Login successful!');
          
          // Store authentication data
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminData', JSON.stringify(data.user));
          
          // Show success message
          showSuccess('Login successful! Redirecting to dashboard...');
          
          // Redirect to admin dashboard after a brief delay
          setTimeout(() => {
            window.location.href = 'admin-dashboard.html';
          }, 1500);
          
        } else {
          // Login failed
          console.log('❌ Login failed:', data.message);
          showError(data.message || 'Login failed. Please check your credentials.');
        }
        
      } catch (error) {
        console.error('❌ Login error:', error);
        showError('Network error. Please check your connection and try again.');
      } finally {
        setLoading(false);
      }
    });

    // Auto-hide messages after 5 seconds
    function autoHideMessages() {
      setTimeout(() => {
        hideMessages();
      }, 5000);
    }

    // Check if already logged in
    window.addEventListener('load', function() {
      const adminToken = localStorage.getItem('adminToken');
      if (adminToken) {
        console.log('👤 Admin already logged in, redirecting...');
        window.location.href = 'admin-dashboard.html';
      }
    });

    // Add enter key support for better UX
    emailInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        passwordInput.focus();
      }
    });

    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        loginForm.dispatchEvent(new Event('submit'));
      }
    });

    // Clear messages when user starts typing
    [emailInput, passwordInput].forEach(input => {
      input.addEventListener('input', hideMessages);
    });
  </script>
</body>
</html>
