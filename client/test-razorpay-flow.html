<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Razorpay Payment Flow Test - FreshFruits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8">🧪 Razorpay Payment Flow Test</h1>
        
        <!-- Login Section -->
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-xl font-semibold mb-4">Step 1: Authentication</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="email" id="email" value="john@example.com" placeholder="Email" class="p-2 border rounded">
                <input type="password" id="password" value="password123" placeholder="Password" class="p-2 border rounded">
            </div>
            <button onclick="login()" class="mt-4 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Login</button>
            <div id="loginResult" class="mt-2 text-sm"></div>
        </div>

        <!-- Razorpay Test -->
        <div class="bg-white p-6 rounded-lg shadow mb-6">
            <h2 class="text-xl font-semibold mb-4">Step 2: Test Razorpay Payment</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input type="number" id="amount" value="100" placeholder="Amount (₹)" class="p-2 border rounded">
                <input type="text" id="description" value="Test Payment" placeholder="Description" class="p-2 border rounded">
            </div>
            <button onclick="testRazorpayPayment()" class="w-full bg-blue-600 text-white p-4 rounded hover:bg-blue-700 text-lg font-semibold">Test Razorpay Payment</button>
            <div id="paymentResult" class="mt-2 text-sm"></div>
        </div>

        <!-- Console Log -->
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4">Console Log</h2>
            <div id="consoleLog" class="bg-gray-100 p-4 rounded text-sm font-mono h-48 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let authToken = '';
        
        // Console logging function
        function log(message) {
            const consoleLog = document.getElementById('consoleLog');
            const timestamp = new Date().toLocaleTimeString();
            consoleLog.innerHTML += `[${timestamp}] ${message}\n`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
            console.log(message);
        }
        
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('loginResult');
            
            log(`Attempting login with email: ${email}`);
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    authToken = data.token;
                    result.innerHTML = '✅ Login successful!';
                    result.className = 'mt-2 text-sm text-green-600';
                    log('✅ Login successful, token received');
                } else {
                    result.innerHTML = '❌ Login failed: ' + data.message;
                    result.className = 'mt-2 text-sm text-red-600';
                    log('❌ Login failed: ' + data.message);
                }
            } catch (err) {
                result.innerHTML = '❌ Error: ' + err.message;
                result.className = 'mt-2 text-sm text-red-600';
                log('❌ Login error: ' + err.message);
            }
        }
        
        async function testRazorpayPayment() {
            const result = document.getElementById('paymentResult');
            const amount = document.getElementById('amount').value;
            const description = document.getElementById('description').value;
            
            if (!authToken) {
                result.innerHTML = '❌ Please login first';
                result.className = 'mt-2 text-sm text-red-600';
                log('❌ Please login first');
                return;
            }
            
            log('Starting Razorpay payment test...');
            log(`Amount: ₹${amount}, Description: ${description}`);
            
            try {
                // Step 1: Create Razorpay order
                log('Step 1: Creating Razorpay order...');
                const orderRes = await fetch('/api/orders/razorpay/create-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify({
                        amount: parseInt(amount),
                        currency: 'INR'
                    })
                });
                
                if (!orderRes.ok) {
                    const error = await orderRes.json();
                    throw new Error(error.message || 'Failed to create Razorpay order');
                }
                
                const razorpayOrder = await orderRes.json();
                log(`✅ Razorpay order created: ${razorpayOrder.id}`);
                log(`Order amount: ${razorpayOrder.amount} paise`);
                
                // Step 2: Initialize Razorpay payment
                log('Step 2: Initializing Razorpay payment...');
                const options = {
                    key: 'rzp_test_51H5jK8vJ6mN3pQ7', // Test key
                    amount: razorpayOrder.amount,
                    currency: razorpayOrder.currency,
                    name: 'FreshFruits',
                    description: description,
                    order_id: razorpayOrder.id,
                    handler: async function (response) {
                        log('✅ Payment successful!');
                        log(`Payment ID: ${response.razorpay_payment_id}`);
                        log(`Order ID: ${response.razorpay_order_id}`);
                        log(`Signature: ${response.razorpay_signature}`);
                        
                        try {
                            // Step 3: Verify payment
                            log('Step 3: Verifying payment...');
                            const verifyRes = await fetch('/api/orders/razorpay/verify-payment', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${authToken}`
                                },
                                body: JSON.stringify({
                                    razorpay_order_id: response.razorpay_order_id,
                                    razorpay_payment_id: response.razorpay_payment_id,
                                    razorpay_signature: response.razorpay_signature,
                                    realOrderDetails: {
                                        productId: 'test_product_id',
                                        quantity: 1,
                                        recipientName: 'Test User',
                                        mobile: '9876543210',
                                        address: 'Test Address',
                                        pincode: '123456',
                                        total: amount,
                                        paymentMethod: 'Razorpay',
                                        paymentStatus: 'Completed',
                                        paymentId: response.razorpay_payment_id
                                    }
                                })
                            });
                            
                            if (verifyRes.ok) {
                                const order = await verifyRes.json();
                                log('✅ Payment verified and order created!');
                                log(`Order ID: ${order.order._id}`);
                                result.innerHTML = '✅ Payment successful! Order created: ' + order.order._id;
                                result.className = 'mt-2 text-sm text-green-600';
                            } else {
                                const error = await verifyRes.json();
                                log('❌ Payment verification failed: ' + error.message);
                                result.innerHTML = '❌ Payment verification failed: ' + error.message;
                                result.className = 'mt-2 text-sm text-red-600';
                            }
                        } catch (error) {
                            log('❌ Payment verification error: ' + error.message);
                            result.innerHTML = '❌ Payment verification error: ' + error.message;
                            result.className = 'mt-2 text-sm text-red-600';
                        }
                    },
                    prefill: {
                        name: 'Test User',
                        contact: '9876543210'
                    },
                    theme: {
                        color: '#10B981'
                    }
                };
                
                const rzp = new Razorpay(options);
                rzp.open();
                
            } catch (error) {
                log('❌ Payment error: ' + error.message);
                result.innerHTML = '❌ Payment error: ' + error.message;
                result.className = 'mt-2 text-sm text-red-600';
            }
        }
    </script>
</body>
</html>
