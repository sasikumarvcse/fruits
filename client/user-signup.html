<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - FreshFruits</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .login-bg { background-image: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80'); background-size: cover; background-position: center; }
    .toast {
      visibility: hidden;
      min-width: 250px;
      margin-left: -125px;
      background-color: #333;
      color: #fff;
      text-align: center;
      border-radius: 2px;
      padding: 16px;
      position: fixed;
      z-index: 100;
      left: 50%;
      bottom: 30px;
      font-size: 17px;
      opacity: 0;
      transition: opacity 0.3s, bottom 0.3s;
    }
    .toast.show {
      visibility: visible;
      opacity: 1;
      bottom: 50px;
    }
  </style>
</head>
<body class="bg-gray-50">
  <div id="toast" class="toast"></div>
  <div class="min-h-screen flex">
    <!-- Left Panel: Image and Branding -->
    <div class="hidden lg:flex w-1/2 login-bg relative items-end p-12 text-white">
      <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
      <div class="relative z-10 flex flex-col items-center justify-center w-full h-full text-center">
        <h1 class="text-4xl font-bold mb-4">🍎 Join FreshFruits</h1>
        <p class="text-lg opacity-80">Create your user account and start exploring a world of products and experiences.</p>
      </div>
    </div>
    <!-- Right Panel: Signup Form -->
    <div class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12">
      <div class="w-full max-w-md">
        <div class="text-center mb-8">
          <div class="inline-block w-12 h-12 bg-gradient-to-r from-green-500 to-blue-600 rounded-lg flex items-center justify-center mr-3">
            <i class="fas fa-shopping-bag text-white text-xl"></i>
          </div>
                  <h1 class="text-3xl font-bold text-gray-800 mt-4">FreshFruits</h1>
        <p class="text-gray-500 mt-2">Create your account</p>
        </div>
        <form id="signupForm" class="space-y-5">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="form-group">
              <label for="firstName" class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
              <input type="text" id="firstName" name="firstName" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">
            </div>
            <div class="form-group">
              <label for="lastName" class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
              <input type="text" id="lastName" name="lastName" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">
            </div>
          </div>
          <div class="form-group">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
            <input type="email" id="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">
          </div>
          <div class="form-group">
            <label for="mobile" class="block text-sm font-medium text-gray-700 mb-2">Mobile Number</label>
            <input type="tel" id="mobile" name="mobile" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">
          </div>
          <div class="form-group">
            <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
            <input type="password" id="password" name="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">
          </div>
          <div class="form-group">
            <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">
          </div>
          <button type="submit" class="btn w-full bg-gradient-to-r from-green-600 to-blue-600 text-white py-3 px-4 rounded-lg hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition-all font-semibold">Create Account</button>
        </form>
        <div class="mt-8 text-center">
          <p class="text-sm text-gray-600">
            Already have an account? <a href="login.html" class="text-green-600 hover:underline font-medium">Log in</a>
          </p>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const signupForm = document.getElementById('signupForm');
      signupForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (password !== confirmPassword) {
          showToast('Passwords do not match!', true);
          return;
        }
        const formData = {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          email: document.getElementById('email').value,
          mobile: document.getElementById('mobile').value,
          password: password,
          role: 'user'
        };
        try {
          const response = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
          });
          const data = await response.json();
          if (response.ok) {
            showToast('Registration successful! Please login.');
            setTimeout(() => {
              window.location.href = 'login.html';
            }, 1500);
          } else {
            showToast(data.message || 'Registration failed', true);
          }
        } catch (error) {
          showToast('Error during registration', true);
          console.error(error);
        }
      });
    });
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show';
      if (isError) {
        toast.style.backgroundColor = '#dc2626';
      } else {
        toast.style.backgroundColor = '#059669';
      }
      setTimeout(function(){ 
        toast.className = toast.className.replace('show', ''); 
      }, 3000);
    }
  </script>
</body>
</html>
