<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - FreshFruits</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-2xl font-bold mb-4">API Test</h1>
        <button id="testBtn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
            Test Registration API
        </button>
        <div id="result" class="mt-4 p-4 bg-gray-100 rounded hidden">
            <pre id="resultText"></pre>
        </div>
    </div>

    <script>
        document.getElementById('testBtn').addEventListener('click', async () => {
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            
            const testData = {
                firstName: 'Test',
                lastName: 'User',
                email: `test${Date.now()}@example.com`,
                mobile: `1234567${Date.now().toString().slice(-4)}`,
                password: 'password123',
                role: 'user'
            };

            try {
                console.log('Testing with data:', testData);
                
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testData)
                });

                const data = await response.json();
                
                resultText.textContent = JSON.stringify({
                    status: response.status,
                    statusText: response.statusText,
                    data: data
                }, null, 2);
                
                resultDiv.classList.remove('hidden');
                
                if (response.ok) {
                    resultDiv.className = 'mt-4 p-4 bg-green-100 rounded';
                } else {
                    resultDiv.className = 'mt-4 p-4 bg-red-100 rounded';
                }
                
            } catch (error) {
                resultText.textContent = `Error: ${error.message}`;
                resultDiv.className = 'mt-4 p-4 bg-red-100 rounded';
                resultDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
