<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥗 Arobowl - User Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .address-card {
            transition: all 0.3s ease;
        }
        
        .address-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        
        .address-card.selected {
            border-color: #10b981;
            background-color: #f0fdf4;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="user-dashboard.html" class="text-gray-400 hover:text-gray-600 mr-4">
                        <i class="fas fa-arrow-left text-xl"></i>
                    </a>
                    <h1 class="text-xl font-semibold text-gray-900">My Profile</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="user-dashboard.html" class="text-gray-600 hover:text-gray-900">
                        <i class="fas fa-home text-lg"></i>
                    </a>
                    <button id="logoutBtn" class="text-red-600 hover:text-red-700">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Loading State -->
        <div id="loadingState" class="text-center py-12">
            <div class="loading-spinner mx-auto"></div>
            <p class="mt-4 text-gray-600">Loading profile...</p>
        </div>

        <!-- Profile Content -->
        <div id="profileContent" class="hidden">
            <!-- Profile View Mode -->
            <div id="profileView" class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="p-8">
                    <div class="flex items-center justify-between mb-8">
                        <div class="flex items-center space-x-4">
                            <div class="w-20 h-20 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full flex items-center justify-center text-white text-3xl font-bold" id="profileAvatar">
                                <!-- Avatar initials will be set here -->
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold text-gray-900" id="profileFullName">
                                    <!-- Full name will be set here -->
                                </h2>
                                <p class="text-gray-500" id="profileEmailView">
                                    <!-- Email will be set here -->
                                </p>
                            </div>
                        </div>
                        <button onclick="switchToEditMode()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-colors font-medium">
                            <i class="fas fa-edit mr-2"></i>
                            Edit Profile
                        </button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div class="border-b border-gray-200 pb-4">
                                <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide">Contact Information</h3>
                            </div>
                            <div class="space-y-3">
                                <div class="flex items-center space-x-3">
                                    <i class="fas fa-envelope text-gray-400 w-5"></i>
                                    <div>
                                        <p class="text-sm text-gray-500">Email</p>
                                        <p class="font-medium" id="profileEmailDisplay"></p>
                                    </div>
                                </div>
                                <div class="flex items-center space-x-3">
                                    <i class="fas fa-phone text-gray-400 w-5"></i>
                                    <div>
                                        <p class="text-sm text-gray-500">Mobile</p>
                                        <p class="font-medium" id="profileMobileDisplay"></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Address Management Section -->
                    <div class="space-y-4 mt-8">
                        <div class="border-b border-gray-200 pb-4">
                            <h3 class="text-sm font-medium text-gray-500 uppercase tracking-wide">Delivery Addresses</h3>
                        </div>
                        
                        <!-- Address List -->
                        <div id="addressList" class="space-y-4">
                            <!-- Addresses will be loaded here -->
                        </div>
                        
                        <!-- Add New Address Button -->
                        <button onclick="showAddAddressForm()" class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors font-medium">
                            <i class="fas fa-plus mr-2"></i>Add New Address
                        </button>
                    </div>
                </div>
            </div>

            <!-- Profile Edit Mode -->
            <div id="profileEdit" class="bg-white rounded-xl shadow-sm overflow-hidden hidden">
                <div class="p-8">
                    <div class="flex items-center justify-between mb-8">
                        <h2 class="text-2xl font-bold text-gray-900">Edit Profile</h2>
                        <button onclick="switchToViewMode()" class="text-gray-400 hover:text-gray-600">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>

                    <form id="profileEditForm" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="editFirstName" class="block text-sm font-medium text-gray-700 mb-2">First Name</label>
                                <input type="text" id="editFirstName" name="firstName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                            <div>
                                <label for="editLastName" class="block text-sm font-medium text-gray-700 mb-2">Last Name</label>
                                <input type="text" id="editLastName" name="lastName" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            </div>
                        </div>
                        <div>
                            <label for="editMobile" class="block text-sm font-medium text-gray-700 mb-2">Mobile</label>
                            <input type="tel" id="editMobile" name="mobile" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="flex justify-end space-x-4">
                            <button type="button" onclick="switchToViewMode()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                                Cancel
                            </button>
                            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                                Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Address Form Modal -->
    <div id="addressModal" class="modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 id="addressFormTitle" class="text-xl font-semibold text-gray-900">Add New Address</h3>
                <button onclick="closeAddressModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            
            <form id="addressForm" class="space-y-4">
                <input type="hidden" id="addressId" name="addressId">
                
                <div>
                    <label for="recipientName" class="block text-sm font-medium text-gray-700 mb-2">Recipient Name *</label>
                    <input type="text" id="recipientName" name="recipientName" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label for="mobile" class="block text-sm font-medium text-gray-700 mb-2">Mobile Number *</label>
                    <input type="tel" id="mobile" name="mobile" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700 mb-2">Address *</label>
                    <textarea id="address" name="address" rows="3" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="pincode" class="block text-sm font-medium text-gray-700 mb-2">Pincode *</label>
                        <input type="text" id="pincode" name="pincode" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="city" class="block text-sm font-medium text-gray-700 mb-2">City *</label>
                        <input type="text" id="city" name="city" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                
                <div>
                    <label for="state" class="block text-sm font-medium text-gray-700 mb-2">State *</label>
                    <input type="text" id="state" name="state" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label for="addressType" class="block text-sm font-medium text-gray-700 mb-2">Address Type</label>
                    <select id="addressType" name="addressType" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="home">Home</option>
                        <option value="work">Work</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                
                <div class="flex items-center">
                    <input type="checkbox" id="isDefault" name="isDefault" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="isDefault" class="ml-2 block text-sm text-gray-900">Set as default address</label>
                </div>
                
                <div class="flex justify-end space-x-4 pt-4">
                    <button type="button" onclick="closeAddressModal()" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                        Cancel
                    </button>
                    <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                        Save Address
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notification" class="fixed top-4 right-4 z-50 hidden">
        <div class="bg-white border border-gray-200 rounded-lg shadow-lg p-4 max-w-sm">
            <div class="flex items-center">
                <div id="notificationIcon" class="mr-3"></div>
                <div>
                    <p id="notificationMessage" class="text-sm font-medium text-gray-900"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let userProfile = null;
        let userAddresses = [];

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth();
            setupEventListeners();
        });

        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            loadProfile();
        }

        // Setup event listeners
        function setupEventListeners() {
            // Logout button
            document.getElementById('logoutBtn').addEventListener('click', function() {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
            });

            // Profile edit form
            document.getElementById('profileEditForm').addEventListener('submit', function(e) {
                e.preventDefault();
                updateProfile();
            });

            // Address form
            document.getElementById('addressForm').addEventListener('submit', function(e) {
                e.preventDefault();
                saveAddress();
            });
        }

        // Load user profile
        async function loadProfile() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/user/profile', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load profile');
                }

                userProfile = await response.json();
                displayProfile();
                loadAddresses();
                
                document.getElementById('loadingState').classList.add('hidden');
                document.getElementById('profileContent').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading profile:', error);
                showNotification('Failed to load profile', 'error');
            }
        }

        // Display profile information
        function displayProfile() {
            if (!userProfile) return;

            const fullName = `${userProfile.firstName || ''} ${userProfile.lastName || ''}`.trim();
            const initials = fullName.split(' ').map(n => n[0]).join('').toUpperCase();

            document.getElementById('profileAvatar').textContent = initials;
            document.getElementById('profileFullName').textContent = fullName || 'User';
            document.getElementById('profileEmailView').textContent = userProfile.email || '';
            document.getElementById('profileEmailDisplay').textContent = userProfile.email || 'Not provided';
            document.getElementById('profileMobileDisplay').textContent = userProfile.mobile || 'Not provided';

            // Set edit form values
            document.getElementById('editFirstName').value = userProfile.firstName || '';
            document.getElementById('editLastName').value = userProfile.lastName || '';
            document.getElementById('editMobile').value = userProfile.mobile || '';
        }

        // Load user addresses
        async function loadAddresses() {
            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/user/addresses', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    userAddresses = await response.json();
                    renderAddresses();
                }
            } catch (error) {
                console.error('Error loading addresses:', error);
            }
        }

        // Render addresses
        function renderAddresses() {
            const addressList = document.getElementById('addressList');
            
            if (userAddresses.length === 0) {
                addressList.innerHTML = `
                    <div class="text-center py-8 text-gray-500">
                        <i class="fas fa-map-marker-alt text-4xl mb-4"></i>
                        <p>No addresses found</p>
                        <p class="text-sm">Add your first delivery address</p>
                    </div>
                `;
                return;
            }

            addressList.innerHTML = userAddresses.map(address => `
                <div class="address-card bg-white border border-gray-200 rounded-lg p-4 hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h4 class="font-semibold text-gray-900">${address.recipientName || address.name}</h4>
                            <p class="text-sm text-gray-600">${address.mobile}</p>
                        </div>
                        <div class="flex space-x-2">
                            ${address.isDefault ? '<span class="bg-green-100 text-green-800 text-xs px-2 py-1 rounded">Default</span>' : ''}
                            <button onclick="editAddress('${address._id}')" class="text-blue-600 hover:text-blue-700">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteAddress('${address._id}')" class="text-red-600 hover:text-red-700">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-sm text-gray-700">
                        <p>${address.address}</p>
                        <p>${address.city}, ${address.state} - ${address.pincode}</p>
                        <p class="text-gray-500 mt-1">${address.addressType} address</p>
                    </div>
                </div>
            `).join('');
        }

        // Show add address form
        function showAddAddressForm() {
            document.getElementById('addressFormTitle').textContent = 'Add New Address';
            document.getElementById('addressId').value = '';
            document.getElementById('addressForm').reset();
            document.getElementById('addressModal').style.display = 'block';
        }

        // Edit address
        function editAddress(addressId) {
            const address = userAddresses.find(addr => addr._id === addressId);
            if (!address) return;

            document.getElementById('addressFormTitle').textContent = 'Edit Address';
            document.getElementById('addressId').value = addressId;
            document.getElementById('recipientName').value = address.recipientName || address.name || '';
            document.getElementById('mobile').value = address.mobile || '';
            document.getElementById('address').value = address.address || '';
            document.getElementById('pincode').value = address.pincode || '';
            document.getElementById('city').value = address.city || '';
            document.getElementById('state').value = address.state || '';
            document.getElementById('addressType').value = address.addressType || 'home';
            document.getElementById('isDefault').checked = address.isDefault || false;

            document.getElementById('addressModal').style.display = 'block';
        }

        // Delete address
        async function deleteAddress(addressId) {
            if (!confirm('Are you sure you want to delete this address?')) return;

            try {
                const token = localStorage.getItem('token');
                const response = await fetch(`/api/user/addresses/${addressId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    showNotification('Address deleted successfully', 'success');
                    loadAddresses();
                } else {
                    throw new Error('Failed to delete address');
                }
            } catch (error) {
                console.error('Error deleting address:', error);
                showNotification('Failed to delete address', 'error');
            }
        }

        // Save address
        async function saveAddress() {
            const form = document.getElementById('addressForm');
            const formData = new FormData(form);
            
            const addressData = {
                recipientName: formData.get('recipientName'),
                mobile: formData.get('mobile'),
                address: formData.get('address'),
                pincode: formData.get('pincode'),
                city: formData.get('city'),
                state: formData.get('state'),
                addressType: formData.get('addressType'),
                isDefault: formData.get('isDefault') === 'on'
            };

            // Validate required fields
            if (!addressData.recipientName || !addressData.mobile || !addressData.address || !addressData.pincode || !addressData.city || !addressData.state) {
                showNotification('Please fill all required fields', 'error');
                return;
            }

            try {
                const token = localStorage.getItem('token');
                const addressId = document.getElementById('addressId').value;
                const method = addressId ? 'PUT' : 'POST';
                const url = addressId ? `/api/user/addresses/${addressId}` : '/api/user/addresses';

                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(addressData)
                });

                if (response.ok) {
                    showNotification(addressId ? 'Address updated successfully' : 'Address added successfully', 'success');
                    closeAddressModal();
                    loadAddresses();
                } else {
                    throw new Error('Failed to save address');
                }
            } catch (error) {
                console.error('Error saving address:', error);
                showNotification('Failed to save address', 'error');
            }
        }

        // Update profile
        async function updateProfile() {
            const formData = new FormData(document.getElementById('profileEditForm'));
            
            const updateData = {
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                mobile: formData.get('mobile')
            };

            try {
                const token = localStorage.getItem('token');
                const response = await fetch('/api/user/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(updateData)
                });

                if (response.ok) {
                    showNotification('Profile updated successfully', 'success');
                    loadProfile();
                    switchToViewMode();
                } else {
                    throw new Error('Failed to update profile');
                }
            } catch (error) {
                console.error('Error updating profile:', error);
                showNotification('Failed to update profile', 'error');
            }
        }

        // Close address modal
        function closeAddressModal() {
            document.getElementById('addressModal').style.display = 'none';
        }

        // Switch to edit mode
        function switchToEditMode() {
            document.getElementById('profileView').classList.add('hidden');
            document.getElementById('profileEdit').classList.remove('hidden');
        }

        // Switch to view mode
        function switchToViewMode() {
            document.getElementById('profileEdit').classList.add('hidden');
            document.getElementById('profileView').classList.remove('hidden');
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.getElementById('notification');
            const messageEl = document.getElementById('notificationMessage');
            const iconEl = document.getElementById('notificationIcon');

            messageEl.textContent = message;

            // Set icon and colors based on type
            switch (type) {
                case 'success':
                    iconEl.innerHTML = '<i class="fas fa-check-circle text-green-500"></i>';
                    break;
                case 'error':
                    iconEl.innerHTML = '<i class="fas fa-exclamation-circle text-red-500"></i>';
                    break;
                default:
                    iconEl.innerHTML = '<i class="fas fa-info-circle text-blue-500"></i>';
            }

            notification.classList.remove('hidden');
            
            // Auto-hide after 3 seconds
            setTimeout(() => {
                notification.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
